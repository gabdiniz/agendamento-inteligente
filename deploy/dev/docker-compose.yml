# ─── Docker Compose — MyAgendix DEV (Servidor) ────────────────────────────────
#
# Sobe: PostgreSQL + API + Web (static via nginx)
#
# Uso no servidor (dentro de /opt/apps/myagendix/dev/):
#   sudo docker compose up -d
#   sudo docker compose ps
#   sudo docker compose logs --tail=50 api
#
# Requer: arquivo .env nesta mesma pasta (copiar de .env.example e preencher)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: myagendix-dev-postgres
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── API (Fastify) ─────────────────────────────────────────────────────────
  api:
    image: myagendix-api:dev
    container_name: myagendix-dev-api
    ports:
      - "3334:3333"       # host:container — nginx fará proxy para 3334
    environment:
      NODE_ENV:        development
      PORT:            3333
      HOST:            0.0.0.0
      DATABASE_URL:    postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      APP_URL:         http://${APP_DOMAIN}
      JWT_SECRET:      ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Web (Vite build servido por nginx) ────────────────────────────────────
  web:
    image: myagendix-web:dev
    container_name: myagendix-dev-web
    ports:
      - "3335:80"         # host:container — nginx fará proxy para 3335
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    driver: bridge

volumes:
  postgres-data:
    name: myagendix-dev-postgres-data
