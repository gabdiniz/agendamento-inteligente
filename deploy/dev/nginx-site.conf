# ─── Nginx — MyAgendix DEV ────────────────────────────────────────────────────
#
# Colocar em: /opt/apps/_infra/nginx/sites-available/myagendix-dev.conf
# Ativar com:
#   ln -sf /opt/apps/_infra/nginx/sites-available/myagendix-dev.conf \
#           /opt/apps/_infra/nginx/sites-enabled/myagendix-dev.conf
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream: API (Fastify) ───────────────────────────────────────────────────
upstream myagendix_dev_api {
    server 127.0.0.1:3334;
    keepalive 32;
}

# ── Upstream: Web (React SPA) ─────────────────────────────────────────────────
upstream myagendix_dev_web {
    server 127.0.0.1:3335;
    keepalive 16;
}

# ── Servidor HTTP ─────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen 8080 default_server;
    # default_server captura qualquer hostname não reconhecido pelo nginx
    # (ex: tunnel do Cloudflare, IP direto, localhost)
    server_name dev.myagendix.com.br _;

    access_log /opt/apps/_infra/logs/myagendix-dev.access.log;
    error_log  /opt/apps/_infra/logs/myagendix-dev.error.log warn;

    client_max_body_size 10m;

    # ── Rotas da API (Fastify) ────────────────────────────────────────────────

    # Rotas de tenant: /t/:slug/*
    location /t/ {
        proxy_pass         http://myagendix_dev_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # Rotas de API do Super Admin: /super-admin/auth/*, /super-admin/tenants/*, /super-admin/upload/*
    # NÃO inclui /super-admin/login — essa é uma rota do frontend (SPA)
    location ~ ^/super-admin/(auth|tenants|upload)(/|$) {
        proxy_pass         http://myagendix_dev_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # Arquivos estáticos servidos pela API (logos, uploads)
    location /uploads/ {
        proxy_pass         http://myagendix_dev_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;

        # Cache agressivo para assets estáticos
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Health check da API
    location /health {
        proxy_pass         http://myagendix_dev_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://myagendix_dev_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # Necessário para o React Router funcionar (SPA fallback)
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://myagendix_dev_web;
        proxy_set_header Host $host;
    }
}
