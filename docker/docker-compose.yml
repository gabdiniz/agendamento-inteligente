services:

  # ─── Nginx — Reverse Proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: myagendix-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - myagendix-net

  # ─── API — Backend Fastify ──────────────────────────────────────────────
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    container_name: myagendix-api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - myagendix-net

  # ─── Worker — BullMQ ────────────────────────────────────────────────────
  worker:
    build:
      context: ../
      dockerfile: docker/Dockerfile.worker
    container_name: myagendix-worker
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - myagendix-net

  # ─── Web — React App (static) ───────────────────────────────────────────
  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile.web
    container_name: myagendix-web
    restart: unless-stopped
    networks:
      - myagendix-net

  # ─── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: myagendix-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - myagendix-net

  # ─── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: myagendix-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - myagendix-net

  # ─── MinIO — Object Storage ─────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: myagendix-minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - myagendix-net

  # ─── Certbot — SSL ──────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: myagendix-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

# ─── Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  minio-data:
  certbot-www:
  certbot-certs:

# ─── Network ──────────────────────────────────────────────────────────────
networks:
  myagendix-net:
    driver: bridge
