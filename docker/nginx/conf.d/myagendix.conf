# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────
server {
    listen 80;
    server_name myagendix.com www.myagendix.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name myagendix.com www.myagendix.com;

    ssl_certificate     /etc/letsencrypt/live/myagendix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myagendix.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── API ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3333/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── WebSocket (Socket.io) ───────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://api:3333/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # ─── MinIO Console (acesso interno) ──────────────────────────────────
    location /minio/ {
        proxy_pass         http://minio:9001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ─── Web App (React SPA) ─────────────────────────────────────────────
    location / {
        proxy_pass         http://web:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # SPA fallback
        try_files $uri $uri/ @spa;
    }

    location @spa {
        proxy_pass http://web:80;
    }
}
