# ─── Docker Compose — Desenvolvimento Local ───────────────────────────────────
#
# Sobe apenas a infraestrutura necessária (Postgres + Redis).
# A API e o Web rodam localmente com hot-reload (pnpm dev).
#
# Uso:
#   docker compose -f docker/docker-compose.dev.yml up -d
#   docker compose -f docker/docker-compose.dev.yml down
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: myagendix-postgres-dev
    environment:
      POSTGRES_USER: myagendix
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myagendix
    ports:
      - "5433:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myagendix -d myagendix"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: myagendix-redis-dev
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-dev-data:
  redis-dev-data:
